version: '3.8'

services:
  # ============================================================
  # Payload CMS — Admin panel + REST/GraphQL API (Next.js)
  # ============================================================
  payload:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${PAYLOAD_PORT:-3000}:3000"
    volumes:
      - ./uploads:/app/uploads
    environment:
      NODE_ENV: production
      PORT: "3000"

      PAYLOAD_SECRET: "${PAYLOAD_SECRET}"
      NEXT_PUBLIC_SERVER_URL: "${NEXT_PUBLIC_SERVER_URL:-http://localhost:3000}"

      # MongoDB (external, shared with Symfony)
      MONGODB_URI: "${MONGODB_URI:-mongodb://192.168.0.31:27017/wib_test}"

      # Admin user (seeded on first run)
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@asigurari.ro}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"

      # AI features
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"

      # n8n webhook
      N8N_WEBHOOK_URL: "${N8N_WEBHOOK_URL:-http://n8n:5678}"

      # CORS
      CORS_ORIGIN: "${CORS_ORIGIN:-https://www.asigurari.ro}"

      # Email (SMTP for password reset, invitations)
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      SMTP_SECURE: "${SMTP_SECURE:-false}"
      EMAIL_FROM: "${EMAIL_FROM:-noreply@asigurari.ro}"

      # Preview
      PREVIEW_SECRET: "${PREVIEW_SECRET:-ee4016c8434b8bfac95a92cb7cc44bb9}"
      SITE_URL: "${SITE_URL:-https://www.asigurari.ro}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ============================================================
  # n8n — Workflow automation (social media, newsletter, etc.)
  # ============================================================
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-5678}:5678"
    volumes:
      - n8n-data:/home/node/.n8n
    environment:
      N8N_HOST: "${N8N_HOST:-localhost}"
      N8N_PORT: "5678"
      N8N_PROTOCOL: "${N8N_PROTOCOL:-http}"
      WEBHOOK_URL: "${N8N_WEBHOOK_URL:-http://localhost:5678}"
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: "${N8N_USER:-admin}"
      N8N_BASIC_AUTH_PASSWORD: "${N8N_PASSWORD}"
      GENERIC_TIMEZONE: "Europe/Bucharest"
      TZ: "Europe/Bucharest"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ============================================================
  # Preview — lightweight nginx serving the preview SPA
  # Editors open http://localhost:8056/?id=123&token=xxx
  # ============================================================
  preview:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8056:80"
    volumes:
      - ./preview:/usr/share/nginx/html:ro
      - ./preview/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  n8n-data:
    driver: local
